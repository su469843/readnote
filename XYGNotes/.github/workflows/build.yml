name: Android Build

on:
  push:
    branches:
      - beta
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 安装依赖
        run: npm ci

      - name: 解码 Keystore
        if: github.ref_name == 'master'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -di > ${{ runner.temp }}/keystore.jks

      - name: 构建 Release APK (beta, debug签名)
        if: github.ref_name == 'beta'
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: 构建 Release APK (master, 正式签名)
        if: github.ref_name == 'master'
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease \
            -PKEYSTORE_PATH=${{ runner.temp }}/keystore.jks \
            -PKEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }} \
            -PKEY_ALIAS=${{ secrets.KEY_ALIAS }} \
            -PKEY_PASSWORD=${{ secrets.KEY_PASSWORD }}

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ github.ref_name }}-${{ github.run_number }}
          path: android/app/build/outputs/apk/**/*.apk