name: Android Build

on:
  push:
    branches:
      - beta
      - master
    tags:
      - 'v*'  # v 开头的 tag 也会触发

jobs:
  build:
    runs-on: ubuntu-latest
    # 如果是 tag 触发，但 tag 不包含 'beta' 且当前分支是 beta，则跳过
    # 如果是普通 push，正常构建
    steps:
      - uses: actions/checkout@v4
      
      # ... （省略 JDK、Node、依赖安装步骤）
      
      - name: 解码 Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -di > ${{ runner.temp }}/keystore.jks

      - name: 构建 Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease \
            -PKEYSTORE_PATH=${{ runner.temp }}/keystore.jks \
            -PKEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }} \
            -PKEY_ALIAS=${{ secrets.KEY_ALIAS }} \
            -PKEY_PASSWORD=${{ secrets.KEY_PASSWORD }}

      - name: 上传 APK（作为工作流产物）
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ github.ref_name }}-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/*.apk

  release:
    runs-on: ubuntu-latest
    needs: build
    # 只有 tag 推送才触发发布（且满足分支+tag匹配规则）
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - uses: actions/checkout@v4
      
      - name: 🔍 校验分支与 Tag 匹配
        run: |
          BRANCH_NAME=$(git rev-parse --abbrev-ref HEAD)
          TAG_NAME=${GITHUB_REF#refs/tags/}
          
          echo "当前分支: $BRANCH_NAME"
          echo "当前 Tag: $TAG_NAME"
          
          if [[ "$BRANCH_NAME" == "beta" ]]; then
            if [[ "$TAG_NAME" != *"beta"* ]]; then
              echo "❌ 错误：在 beta 分支上打 tag 必须包含 'beta'"
              exit 1
            fi
            IS_PRERELEASE=true
          elif [[ "$BRANCH_NAME" == "master" ]]; then
            if [[ "$TAG_NAME" == *"beta"* ]]; then
              echo "❌ 错误：在 master 分支上打 tag 不能包含 'beta'"
              exit 1
            fi
            IS_PRERELEASE=false
          else
            echo "❌ 错误：只允许在 beta 或 master 分支发布"
            exit 1
          fi
          
          echo "IS_PRERELEASE=$IS_PRERELEASE" >> $GITHUB_ENV

      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: app-${{ github.ref_name }}-${{ github.run_number }}
          path: app-release/

      - name: 生成 MD5
        run: |
          cd app-release
          md5sum *.apk > app-release.apk.md5

      - name: 发布到 GitHub Releases
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            ## 📦 版本发布说明
            - 分支: `${{ github.ref_name }}`
            - Tag: ${{ github.ref_name }}
          draft: true
          prerelease: ${{ env.IS_PRERELEASE == 'true' }}
          files: |
            app-release/*.apk
            app-release/*.md5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
